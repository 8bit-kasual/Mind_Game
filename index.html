  <style>

    }
    html, body {

      font-family: 'Nunito', sans-serif;
      -webkit-font-smoothing: antialiased;

      height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }
    /* Prevent double-tap zoom on iOS */
    button { touch-action: manipulation; }
    /* Smooth scroll */
    #root { scroll-behavior: smooth; }
  </style>
